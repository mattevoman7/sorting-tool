<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>Material Measurement Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --surface: #f4f6f8; --surface2: #eaecf0;
    --border: rgba(30,40,60,0.10); --border2: rgba(30,40,60,0.18);
    --text: #1a2332; --muted: #6b7a94; --accent: #3ab76a; --warn: #fb923c;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── START SCREEN ── */
  .start-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 28px; }
  .start-wrap h1 { font-size: 12px; font-weight: 400; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .start-wrap h2 { font-size: 28px; font-weight: 300; line-height: 1.2; margin-bottom: 40px; }
  .field-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: block; }
  .big-input { width: 100%; background: #fff; border: 1.5px solid var(--border2); border-radius: 14px; padding: 16px 20px; font-size: 26px; font-weight: 300; color: var(--text); font-family: 'DM Mono', monospace; outline: none; -webkit-appearance: none; }
  .big-input::placeholder { color: var(--muted); }
  .start-btn { margin-top: 20px; width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 14px; font-size: 16px; font-weight: 500; color: #ffffff; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; }
  .start-btn:active { opacity: 0.85; }

  /* ── LOG SCREEN ── */
  .log-header { padding: 52px 20px 16px; border-bottom: 1px solid var(--border); }
  .log-header .bin-id { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .log-header .bin-val { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .total-bar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
  .total-bar .lbl { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .total-bar .val { font-size: 26px; font-weight: 400; font-family: 'DM Mono', monospace; color: var(--accent); }
  .total-bar .unit { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: 5px; }
  .sec-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 16px 20px 10px; }
  .mat-list { padding: 0 20px; flex: 1; }
  .mat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s, background 0.15s; }
  .mat-item.active { border-color: var(--border2); background: var(--surface2); }
  .mat-top { display: flex; align-items: center; justify-content: space-between; }
  .mat-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .mat-item.inactive .mat-name { color: var(--muted); }
  .mat-controls { display: flex; align-items: center; }
  .sbtn { width: 48px; height: 48px; border-radius: 10px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 24px; font-weight: 300; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .sbtn:active { background: var(--border2); }
  .sval { font-size: 22px; font-family: 'DM Mono', monospace; color: var(--text); min-width: 52px; text-align: center; }
  .mat-item.inactive .sval { color: var(--muted); }
  .step-row { display: flex; gap: 6px; margin-top: 10px; }
  .stbtn { height: 28px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .stbtn.on { background: var(--border2); color: var(--text); }
  .mat-result { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); display: none; justify-content: space-between; align-items: baseline; }
  .mat-result .rlbl { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .mat-result .rval { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--accent); }
  .bar-track { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; display: none; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
  .done-btn-wrap { padding: 20px; }
  .done-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 14px; font-size: 16px; font-weight: 500; color: #ffffff; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; }
  .done-btn:active { opacity: 0.85; }

  /* ── SUMMARY SCREEN ── */
  .sum-header { padding: 52px 20px 16px; border-bottom: 1px solid var(--border); }
  .sum-header .lbl { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .sum-header .bin-val { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .sum-header .ts { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .sum-total { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
  .sum-total .lbl { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .sum-total .val { font-size: 28px; font-weight: 400; font-family: 'DM Mono', monospace; color: var(--accent); }
  .sum-total .unit { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: 5px; }
  .sum-list { padding: 16px 20px; flex: 1; }
  .sum-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .sum-row:last-child { border-bottom: none; }
  .sum-mat { font-size: 15px; font-weight: 500; }
  .sum-right { text-align: right; }
  .sum-weight { font-size: 16px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--accent); }
  .sum-bins { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .sum-actions { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .new-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 14px; font-size: 16px; font-weight: 500; color: #ffffff; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; }
  .new-btn:active { opacity: 0.85; }
  .copy-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--border2); border-radius: 14px; font-size: 15px; font-weight: 400; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; }
  .copy-btn:active { background: var(--surface2); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  /* ── PHOTO ── */
  .photo-section { margin-top: 24px; }
  .photo-btn { width: 100%; padding: 18px; background: var(--surface); border: 1.5px dashed var(--border2); border-radius: 14px; color: var(--muted); font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .photo-btn:active { background: var(--surface2); }
  .photo-preview { width: 100%; border-radius: 14px; margin-top: 10px; display: none; object-fit: cover; max-height: 280px; border: 0.5px solid var(--border2); }
  .photo-preview.show { display: block; }
  .photo-retake { width: 100%; margin-top: 8px; padding: 10px; background: transparent; border: 0.5px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; display: none; -webkit-tap-highlight-color: transparent; }
  .photo-retake.show { display: block; }
  .sum-photo-wrap { padding: 0 20px 4px; display: none; }
  .sum-photo-wrap.show { display: block; }
  .sum-photo-lbl { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .sum-photo { width: 100%; border-radius: 14px; object-fit: cover; max-height: 240px; border: 0.5px solid var(--border2); display: block; }
  .dl-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--border2); border-radius: 14px; font-size: 15px; font-weight: 400; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; display: none; }
  .dl-btn.show { display: block; }
  .dl-btn:active { background: var(--surface2); }

  /* ── OTHER MATERIAL ── */
  .other-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .other-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .other-name-input { width: 100%; background: #fff; border: 1px solid var(--border2); border-radius: 9px; padding: 10px 14px; font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none; }
  .other-name-input::placeholder { color: var(--muted); }
  .other-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .other-qty-wrap { display: flex; align-items: center; gap: 0; }

  .wa-btn { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .wa-btn:active { opacity: 0.85; }

  .email-btn { width: 100%; padding: 18px; background: #3ab76a; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }

    <h2>Material<br>Measurement Tool</h2>
    <span class="field-label">Large bin ID</span>
    <input class="big-input" id="bin-id-input" type="text" placeholder="e.g. BIN-042" autocomplete="off" autocorrect="off" spellcheck="false" />
    <div class="photo-section">
      <span class="field-label">Photo of bin contents</span>
      <input type="file" id="photo-input-camera" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
      <input type="file" id="photo-input-gallery" accept="image/*" style="display:none" onchange="handlePhoto(this)">
      <div style="display:flex;gap:10px;">
        <button class="photo-btn" id="photo-btn-camera" style="flex:1" onclick="document.getElementById('photo-input-camera').click()">
          <span>&#128247;</span>&nbsp; Camera
        </button>
        <button class="photo-btn" id="photo-btn-gallery" style="flex:1" onclick="document.getElementById('photo-input-gallery').click()">
          <span>&#128444;</span>&nbsp; Gallery
        </button>
      </div>
      <img class="photo-preview" id="photo-preview" src="" alt="Bin contents">
      <div style="display:flex;gap:8px;" id="photo-retake" class="photo-retake" style="display:none">
        <button onclick="document.getElementById('photo-input-camera').click()" style="flex:1;padding:10px;background:transparent;border:0.5px solid var(--border);border-radius:10px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;">Retake</button>
        <button onclick="document.getElementById('photo-input-gallery').click()" style="flex:1;padding:10px;background:transparent;border:0.5px solid var(--border);border-radius:10px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;">Choose different</button>
      </div>
    </div>
    <button class="start-btn" onclick="startSession()">Start tipping &#8594;</button>
  </div>
</div>

<script>
var sessionPhoto = null;

var otherBins = 0;
var OTHER_DENSITY = 0.15; // default mid-range density

function adjOther(dir) {
  otherBins = Math.max(0, otherBins + dir);
  document.getElementById('other-sv').textContent = otherBins;
  saveState();
}


function handlePhoto(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    sessionPhoto = e.target.result;
    var prev = document.getElementById('photo-preview');
    prev.src = sessionPhoto;
    prev.classList.add('show');
    document.getElementById('photo-retake').style.display = 'flex';
    document.getElementById('photo-btn').innerHTML = '<span>&#10003;</span>&nbsp; Photo taken — tap to retake';
    saveState();
  };
  reader.readAsDataURL(file);
}










var MATS = [
  { name: "Concrete",     density: 0.9849, color: "#9ca3af" },
  { name: "Metal",        density: 0.2703, color: "#60a5fa" },
  { name: "Plasterboard", density: 0.2364, color: "#a78bfa" },
  { name: "PE",           density: 0.2089, color: "#34d399" },
  { name: "Timber",       density: 0.1256, color: "#fbbf24" },
  { name: "PVC",          density: 0.0854, color: "#f9a8d4" },
  { name: "Cardboard",    density: 0.0362, color: "#fdba74" }
];

var bins = MATS.map(function() { return 0; });
var stepSizes = MATS.map(function() { return 1; });
var sessionBinId = '';

function show(id) {
  ['screen-start','screen-log','screen-summary'].forEach(function(s) {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startSession() {
  var id = document.getElementById('bin-id-input').value.trim();
  if (!id) { document.getElementById('bin-id-input').focus(); return; }
  sessionBinId = id;
  bins = MATS.map(function() { return 0; });
  stepSizes = MATS.map(function() { return 1; });
  buildList();
  var now = new Date();
  var ts = now.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' })
    + ' ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('log-ts').textContent = ts;
  document.getElementById('log-bin-id').textContent = sessionBinId;
  document.getElementById('grand-total').textContent = '0.00';
  saveState();
  show('screen-log');
}

function fmt(v) {
  if (v === Math.floor(v)) return String(v);
  if (Math.round(v * 100) % 50 === 0) return v.toFixed(1);
  return v.toFixed(2);
}

function buildList() {
  var list = document.getElementById('mat-list');
  list.innerHTML = '';
  MATS.forEach(function(m, i) {
    var el = document.createElement('div');
    el.className = 'mat-item inactive';
    el.id = 'item-' + i;
    el.innerHTML =
      '<div class="mat-top">' +
        '<div class="mat-name">' + m.name + '</div>' +
        '<div class="mat-controls">' +
          '<button class="sbtn" ontouchstart="" onclick="adj(' + i + ',-1)">&#8722;</button>' +
          '<div class="sval" id="sv-' + i + '">0</div>' +
          '<button class="sbtn" ontouchstart="" onclick="adj(' + i + ',1)">+</button>' +
        '</div>' +
      '</div>' +
      '<div class="step-row">' +
        '<button class="stbtn on" id="st1-' + i + '" ontouchstart="" onclick="setStep(' + i + ',1)">step 1</button>' +
        '<button class="stbtn" id="st05-' + i + '" ontouchstart="" onclick="setStep(' + i + ',0.5)">&#189;</button>' +
        '<button class="stbtn" id="st025-' + i + '" ontouchstart="" onclick="setStep(' + i + ',0.25)">&#188;</button>' +
      '</div>' +
      '<div class="mat-result" id="res-' + i + '">' +
        '<span class="rlbl">est. weight</span>' +
        '<span class="rval" id="rval-' + i + '">&#8212;</span>' +
      '</div>' +
      '<div class="bar-track" id="bar-' + i + '">' +
        '<div class="bar-fill" id="barf-' + i + '" style="width:0%;background:' + m.color + ';"></div>' +
      '</div>';
    list.appendChild(el);
  });
}

function setStep(i, s) {
  stepSizes[i] = s;
  [1, 0.5, 0.25].forEach(function(v) {
    var id = v === 1 ? 'st1-' : v === 0.5 ? 'st05-' : 'st025-';
    document.getElementById(id + i).className = 'stbtn' + (v === s ? ' on' : '');
  });
}

function adj(i, dir) {
  bins[i] = Math.max(0, Math.round((bins[i] + dir * stepSizes[i]) * 100) / 100);
  document.getElementById('sv-' + i).textContent = fmt(bins[i]);
  document.getElementById('item-' + i).className = 'mat-item ' + (bins[i] > 0 ? 'active' : 'inactive');
  calc();
  saveState();
}

function calc() {
  var weights = MATS.map(function(m, i) { return bins[i] * 2 * m.density; });
  var grandTotal = weights.reduce(function(a, b) { return a + b; }, 0);
  var maxW = Math.max.apply(null, weights.concat([0.001]));
  document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
  MATS.forEach(function(m, i) {
    var resEl = document.getElementById('res-' + i);
    var barEl = document.getElementById('bar-' + i);
    var rvalEl = document.getElementById('rval-' + i);
    var barFill = document.getElementById('barf-' + i);
    if (bins[i] > 0) {
      resEl.style.display = 'flex';
      barEl.style.display = 'block';
      rvalEl.textContent = weights[i].toFixed(2) + ' t';
      barFill.style.width = ((weights[i] / maxW) * 100).toFixed(1) + '%';
    } else {
      resEl.style.display = 'none';
      barEl.style.display = 'none';
    }
  });
}

function showSummary() {
  var weights = MATS.map(function(m, i) { return bins[i] * 2 * m.density; });
  var otherW = (document.getElementById('other-name').value.trim() && otherBins > 0) ? otherBins * 2 * OTHER_DENSITY : 0;
  var grandTotal = weights.reduce(function(a, b) { return a + b; }, 0) + otherW;
  var now = new Date();
  var ts = now.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' })
    + ' ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('sum-bin-id').textContent = sessionBinId;
  document.getElementById('sum-ts').textContent = ts;
  document.getElementById('sum-total-val').textContent = grandTotal.toFixed(2);

  var list = document.getElementById('sum-list');
  list.innerHTML = '';
  MATS.forEach(function(m, i) {
    if (bins[i] === 0) return;
    var row = document.createElement('div');
    row.className = 'sum-row';
    row.innerHTML =
      '<div class="sum-mat">' + m.name + '</div>' +
      '<div class="sum-right">' +
        '<div class="sum-weight">' + weights[i].toFixed(2) + ' t</div>' +
        '<div class="sum-bins">' + fmt(bins[i]) + ' x 2m&#179;</div>' +
      '</div>';
    list.appendChild(row);
  });
  // Other material
  var otherName = document.getElementById('other-name').value.trim();
  if (otherBins > 0 && otherName) {
    var otherWeight = otherBins * 2 * OTHER_DENSITY;
    var row = document.createElement('div');
    row.className = 'sum-row';
    row.innerHTML =
      '<div class="sum-mat">' + otherName + '</div>' +
      '<div class="sum-right">' +
        '<div class="sum-weight">' + otherWeight.toFixed(2) + ' t</div>' +
        '<div class="sum-bins">' + otherBins + ' x 2m&#179;</div>' +
      '</div>';
    list.appendChild(row);
  }

  document.getElementById('copy-btn').textContent = 'Copy summary';
  document.getElementById('copy-btn').classList.remove('copied');
  // Show photo if captured
  var sumPhotoWrap = document.getElementById('sum-photo-wrap');
  var sumPhoto = document.getElementById('sum-photo');
  if (sessionPhoto) {
    sumPhoto.src = sessionPhoto;
    sumPhotoWrap.classList.add('show');
  } else {
    sumPhotoWrap.classList.remove('show');
  }
  show('screen-summary');
}

function copyText() {
  var weights = MATS.map(function(m, i) { return bins[i] * 2 * m.density; });
  var otherW = (document.getElementById('other-name').value.trim() && otherBins > 0) ? otherBins * 2 * OTHER_DENSITY : 0;
  var grandTotal = weights.reduce(function(a, b) { return a + b; }, 0) + otherW;
  var now = new Date();
  var ts = now.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' })
    + ' ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  var lines = ['Bin: ' + sessionBinId, 'Date: ' + ts, ''];
  MATS.forEach(function(m, i) {
    if (bins[i] === 0) return;
    lines.push(m.name + ': ' + weights[i].toFixed(2) + ' t (' + fmt(bins[i]) + ' x 2m\u00B3)');
  });
  var otherNameCopy = document.getElementById('other-name').value.trim();
  if (otherBins > 0 && otherNameCopy) {
    var otherWeightCopy = otherBins * 2 * OTHER_DENSITY;
    lines.push(otherNameCopy + ': ' + otherWeightCopy.toFixed(2) + ' t (' + otherBins + ' x 2m³)');
  }
  lines.push('');
  lines.push('Total: ' + grandTotal.toFixed(2) + ' t');
  var text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
  }
}

function newSession() {
  document.getElementById('bin-id-input').value = '';
  sessionPhoto = null;
  document.getElementById('photo-preview').classList.remove('show');
  document.getElementById('photo-retake').style.display = 'none';
  document.getElementById('photo-btn-camera').innerHTML = '<span>&#128247;</span>&nbsp; Camera';
  document.getElementById('photo-btn-gallery').innerHTML = '<span>&#128444;</span>&nbsp; Gallery';
  document.getElementById('photo-input-camera').value = '';
  document.getElementById('photo-input-gallery').value = '';
  otherBins = 0;
  document.getElementById('other-sv').textContent = '0';
  document.getElementById('other-name').value = '';
  clearState();
  show('screen-start');
}

// ── AUTOSAVE ──────────────────────────────────────────────────────────
var SAVE_KEY = 'mmt_session';

function saveState() {
  try {
    var state = {
      screen: document.querySelector('.screen.active') ? document.querySelector('.screen.active').id : 'screen-start',
      binId: sessionBinId,
      bins: bins,
      stepSizes: stepSizes,
      otherBins: otherBins,
      otherName: document.getElementById('other-name') ? document.getElementById('other-name').value : '',
      photo: sessionPhoto,
      logTs: document.getElementById('log-ts') ? document.getElementById('log-ts').textContent : ''
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function clearState() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function restoreState() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (!s.binId) return;

    sessionBinId = s.binId;
    bins = s.bins || MATS.map(function(){ return 0; });
    stepSizes = s.stepSizes || MATS.map(function(){ return 1; });
    otherBins = s.otherBins || 0;

    // Restore bin ID input
    var binInput = document.getElementById('bin-id-input');
    if (binInput) binInput.value = sessionBinId;

    // Restore photo
    if (s.photo) {
      sessionPhoto = s.photo;
      var prev = document.getElementById('photo-preview');
      if (prev) { prev.src = sessionPhoto; prev.classList.add('show'); }
      var retake = document.getElementById('photo-retake');
      if (retake) retake.style.display = 'flex';
    }

    // If we were past start screen, rebuild log
    if (s.screen === 'screen-log' || s.screen === 'screen-summary') {
      buildList();
      if (s.logTs) document.getElementById('log-ts').textContent = s.logTs;
      document.getElementById('log-bin-id').textContent = sessionBinId;
      // Re-render each material row with saved counts
      MATS.forEach(function(m, i) {
        document.getElementById('sv-' + i).textContent = fmt(bins[i]);
        document.getElementById('item-' + i).className = 'mat-item ' + (bins[i] > 0 ? 'active' : 'inactive');
      });
      calc();
      // Restore other material
      var otherSv = document.getElementById('other-sv');
      if (otherSv) otherSv.textContent = otherBins;
      var otherNameEl = document.getElementById('other-name');
      if (otherNameEl) otherNameEl.value = s.otherName || '';
    }

    // Restore screen
    if (s.screen === 'screen-summary') {
      showSummary();
    } else if (s.screen === 'screen-log') {
      show('screen-log');
    }
    // else stay on start screen (binId pre-filled is enough)
  } catch(e) {}
}

window.addEventListener('load', function() {
  restoreState();
});
// ── END AUTOSAVE ───────────────────────────────────────────────────────

function buildSummaryText() {
  var weights = MATS.map(function(m, i) { return bins[i] * 2 * m.density; });
  var otherW = (document.getElementById('other-name').value.trim() && otherBins > 0) ? otherBins * 2 * OTHER_DENSITY : 0;
  var grandTotal = weights.reduce(function(a, b) { return a + b; }, 0) + otherW;
  var now = new Date();
  var ts = now.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' })
    + ' ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  var lines = ['Material Measurement Tool', 'Bin: ' + sessionBinId, 'Date: ' + ts, ''];
  MATS.forEach(function(m, i) {
    if (bins[i] === 0) return;
    lines.push(m.name + ': ' + weights[i].toFixed(2) + ' t (' + fmt(bins[i]) + ' x 2m³)');
  });
  var otherNameVal = document.getElementById('other-name').value.trim();
  if (otherBins > 0 && otherNameVal) {
    lines.push(otherNameVal + ': ' + otherW.toFixed(2) + ' t (' + otherBins + ' x 2m³)');
  }
  lines.push('');
  lines.push('Total: ' + grandTotal.toFixed(2) + ' t');
  return { text: lines.join('\n'), subject: 'Material Measurement — ' + sessionBinId + ' — ' + ts };
}

function shareNative() {
  var summary = buildSummaryText();

  // Build share data
  var shareData = { title: 'Material Measurement Tool', text: summary.text };

  // If we have a photo, convert base64 to a File and include it
  if (sessionPhoto) {
    try {
      // Convert base64 data URI to Blob
      var parts = sessionPhoto.split(',');
      var mime = parts[0].match(/:(.*?);/)[1];
      var bstr = atob(parts[1]);
      var n = bstr.length;
      var u8arr = new Uint8Array(n);
      while (n--) { u8arr[n] = bstr.charCodeAt(n); }
      var file = new File([u8arr], 'bin-' + sessionBinId + '.jpg', { type: mime });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        shareData.files = [file];
      }
    } catch(e) {}
  }

  if (navigator.share) {
    navigator.share(shareData).then(function() {
      // Share completed — reset for next bin
      newSession();
    }).catch(function(err) {
      // User cancelled — stay on summary; other errors fall back
      if (err.name !== 'AbortError') { fallbackShare(summary); }
    });
  } else {
    fallbackShare(summary);
    newSession();
  }
}

function fallbackShare(summary) {
  // Desktop fallback: open mailto with text, notify about photo
  var photoNote = sessionPhoto ? '\n\n(Photo: save from the app and attach manually)' : '';
  window.location.href = 'mailto:?subject=' + encodeURIComponent(summary.subject) + '&body=' + encodeURIComponent(summary.text + photoNote);
}

</script>
